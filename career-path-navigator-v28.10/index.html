<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Career Path Navigator – تسجيل الدخول">
    <title>Career Path Navigator | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0b0c16;
            background-image: 
                linear-gradient(90deg, #0b0c16 0%, rgba(26, 22, 58, 0.85) 40%, rgba(11, 12, 22, 0.1) 100%),
                url('assets/images/new_image_3.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.45); /* إضافة عتامة خفيفة لألوان اللوجو */
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            gap: 50px;
        }

        .brand-side {
            flex: 1;
        }
        .brand-title {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-family: 'Georgia', serif; /* خط كلاسيكي أنيق يشابه الروح المطلوبة */
        }

        .form-side {
            flex: 0 0 450px;
            width: 100%;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05); /* إضاءة الزجاج */
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 30px;
        }
        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
        }
        .card-header .toggle-text {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: start;
        }
        .input-group label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
            opacity: 0.9;
        }
        .input-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(240, 240, 250, 0.9);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            color: #111;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .forgot-password {
            display: block;
            text-align: start;
            margin-top: -10px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: 0.3s;
        }
        .forgot-password:hover {
            color: #fff;
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
        }
        .login-btn {
            padding: 10px 30px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: #e0e7ff;
            transform: translateY(-2px);
        }

        .or-divider {
            display: flex;
            align-items: center;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            margin: 20px 0;
            text-transform: uppercase;
        }
        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .or-divider::before { margin-inline-end: 15px; }
        .or-divider::after { margin-inline-start: 15px; }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        .social-icon img {
            width: 22px;
            height: 22px;
        }
        .social-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .signup-text {
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }
        .signup-text a {
            color: #fff;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .signup-text a:hover {
            color: #e0e7ff;
        }

        .lang-btn {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 15px; border-radius: 20px; color: #fff; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.2); }

        .oauth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px); z-index: 10001; display: none;
            justify-content: center; align-items: center;
        }
        .oauth-modal {
            background: #fff; width: 400px; padding: 30px; border-radius: 20px;
            text-align: center; color: #333; direction: rtl;
        }
        .account-item {
            border: 1px solid #ddd; padding: 12px; border-radius: 12px; 
            cursor: pointer; margin-bottom: 12px; transition: 0.2s;
        }
        .account-item:hover { background: #f5f5f5; }

        @media (max-width: 900px) {
            .page-wrapper {
                flex-direction: column;
                justify-content: center;
                gap: 40px;
            }
            html[dir="rtl"] .page-wrapper {
                flex-direction: column;
            }
            .brand-title {
                text-align: center;
                font-size: 3.5rem;
            }
            .form-side {
                max-width: 450px;
            }
        }
        
        /* Prevent visual flipping in Arabic */
        html[dir="rtl"] .page-wrapper {
            flex-direction: row-reverse;
        }
    </style>
</head>
<body>

    <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 EN</button>

    <div class="page-wrapper">
        <div class="brand-side">
            <h1 class="brand-title">Career Path Navigator</h1>
        </div>
        
        <div class="form-side">
            <div class="glass-card">
                <div class="card-header">
                    <h2 data-ar="تسجيل الدخول" data-en="Log In">تسجيل الدخول</h2>
                    <span class="toggle-text" data-ar="تسجيل الدخول / إنشاء حساب" data-en="Log In / Sign Up">تسجيل الدخول / إنشاء حساب</span>
                </div>

                <form onsubmit="event.preventDefault(); window.location.href='home.html';">
                    <div class="input-group">
                        <label data-ar="البريد الإلكتروني" data-en="Email">البريد الإلكتروني</label>
                        <input type="email" required>
                    </div>
                    <div class="input-group">
                        <label data-ar="كلمة المرور" data-en="Password">كلمة المرور</label>
                        <input type="password" required>
                    </div>
                    
                    <a href="#" class="forgot-password" data-ar="نسيت كلمة المرور؟" data-en="Forgot Password?">نسيت كلمة المرور؟</a>
                    
                    <div class="action-row">
                        <button type="submit" class="login-btn" data-ar="تسجيل الدخول" data-en="Log In">تسجيل الدخول</button>
                    </div>
                    
                    <div class="or-divider">OR</div>
                    
                    <div class="social-row">
                        <button type="button" class="social-icon" onclick="openOAuth('googleOverlay')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                        </button>
                        <button type="button" class="social-icon" onclick="openOAuth('fbOverlay')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                        </button>
                        <button type="button" class="social-icon" onclick="openOAuth('xOverlay')" style="color: white;">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="signup-text">
                        <span data-ar="ليس لديك حساب؟" data-en="Don't have a account?">ليس لديك حساب؟</span> 
                        <a href="#" data-ar="إنشاء حساب" data-en="Sign up">إنشاء حساب</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- مودال جوجل -->
    <div class="oauth-overlay" id="googleOverlay" onclick="this.style.display='none'">
        <div class="oauth-modal" onclick="event.stopPropagation()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="80" style="margin-bottom: 10px;">
            <h3 style="margin: 10px 0 20px;" data-ar="اختيار حساب للمتابعة" data-en="Choose an account to continue">اختيار حساب للمتابعة</h3>
            <div class="account-item" onclick="window.location.href='home.html'">
                <strong>Ahmed Magdy</strong><br><small style="color:#666;">ahmed.magdy99@gmail.com</small>
            </div>
            <div class="account-item" onclick="window.location.href='home.html'">
                <strong>Work Account</strong><br><small style="color:#666;">careers@company.com</small>
            </div>
        </div>
    </div>

    <!-- مودال فيسبوك -->
    <div class="oauth-overlay" id="fbOverlay" onclick="this.style.display='none'">
        <div class="oauth-modal" onclick="event.stopPropagation()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" width="50" style="margin-bottom: 15px;">
            <h3 style="margin: 10px 0 20px;" data-ar="الدخول بواسطة فيسبوك" data-en="Continue with Facebook">الدخول بواسطة فيسبوك</h3>
            <div class="account-item" onclick="window.location.href='home.html'">
                <strong>احمد مجدي</strong><br><small style="color:#666;">Facebook user</small>
            </div>
        </div>
    </div>

    <!-- مودال X -->
    <div class="oauth-overlay" id="xOverlay" onclick="this.style.display='none'">
        <div class="oauth-modal" onclick="event.stopPropagation()">
            <h3 style="margin: 10px 0 20px;" data-ar="الدخول بواسطة X" data-en="Continue with X">الدخول بواسطة X</h3>
            <div class="account-item" onclick="window.location.href='home.html'">
                <strong>احمد مجدي</strong><br><small style="color:#666;">@ahmedmagdy</small>
            </div>
        </div>
    </div>

    <script>
        // استرجاع اللغة المحفوظة أو 'ar' كافتراضي
        let currentLang = localStorage.getItem('lang') || 'ar';

        function applyLang(lang) {
            const html = document.documentElement;
            const btn = document.getElementById('langBtn');
            const isAr = lang === 'ar';
            
            html.setAttribute('lang', lang);
            // نحافظ على RTL دائماً لتوحيد التجربة مع باقي الموقع
            html.setAttribute('dir', 'rtl');
            btn.innerText = isAr ? '🌐 EN' : '🌐 AR';
            
            document.querySelectorAll('[data-ar]').forEach(el => {
                el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            });
        }

        // تطبيق اللغة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            applyLang(currentLang);
        });

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            applyLang(currentLang);
        }

        function openOAuth(id) {
            document.getElementById(id).style.display = 'flex';
        }
    </script>
</body>
</html>
